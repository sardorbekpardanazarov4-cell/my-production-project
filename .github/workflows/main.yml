name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Pytest with Coverage
        run: |
          # PYTHONPATH o'rnatish import xatolarini oldini oladi
          export PYTHONPATH=$PYTHONPATH:$(pwd)/app
          pytest --cov=app app/test_main.py --cov-fail-under=5

  build-and-push:
    name: Containerize and Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-api:latest
            ghcr.io/${{ github.repository_owner }}/my-api:${{ github.sha }}

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 *CI/CD Natijasi:*
            👤 Kim: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            📊 Holat: ${{ job.status == 'success' && '✅ Muvaffaqiyatli' || '❌ Xatolik yuz berdi' }}
            🔗 Link: https://github.com/${{ github.repository }}/actions
