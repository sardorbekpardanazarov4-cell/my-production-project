name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ] # Faqat main branchga kod tushganda ishlaydi
  pull_request:
    branches: [ "main" ]

jobs:
  # 1-BOSQICH: Testlash
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Pytest with Coverage
        run: |
          # Testlarni yurgizamiz va 80% coverage bo'lishini talab qilamiz
          pytest --cov=app app/test_main.py --cov-fail-under=80

  # 2-BOSQICH: Docker Build va GHCR-ga yuklash
  build-and-push:
    name: Containerize and Push to GHCR
    needs: test # Agar testlar o'tmasa, bu bosqich ishlamaydi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR-ga yozish huquqi
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-api:latest
            ghcr.io/${{ github.repository_owner }}/my-api:${{ github.sha }}
